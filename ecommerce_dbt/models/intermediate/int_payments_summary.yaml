version: 2

models:
  - name: int_payments_summary
    description: "Aggregated payment information per order"

    columns:

      - name: order_id
        description: "Unique identifier of the order"
        tests:
          - not_null
          - unique

      - name: total_payment
        description: "Total payment value for the order"
        tests:
          - not_null

      - name: number_of_payments
        description: "Number of payment installments for the order"
        tests:
          - not_null