version: 2

models:
  - name: int_order_items_products
    description: "Order items enriched with product category and seller information"

    columns:

      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: total_item_value
        tests:
          - not_null