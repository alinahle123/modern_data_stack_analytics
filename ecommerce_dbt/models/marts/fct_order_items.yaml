version: 2

models:
  - name: fct_order_items
    description: "Order item-level fact table used for sales, product,category, and seller performance analysis."

    columns:
      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null

      - name: total_item_value
        tests:
          - not_null