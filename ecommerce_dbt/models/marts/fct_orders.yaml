version: 2

models:
  - name: fct_orders
    description: "Order-level fact table used for order volume, revenue, and delivery performance analysis."
    columns:
      - name: order_id
        description: "Unique identifier for the order"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: order_status
        description: "Status of the order"
        tests:
          - not_null

      - name: order_purchase_ts
        description: "Timestamp when the order was placed"
        tests:
          - not_null

      - name: order_approved_at
        description: "Timestamp when the order was approved"

      - name: order_delivered_customer_date
        description: "Timestamp when the order was delivered to the customer"

      - name: total_payment
        description: "Total payment value for the order"
        tests:
          - not_null

      - name: total_items
        description: "Number of items in the order"
        tests:
          - not_null

      - name: avg_review_score
        description: "Average review score associated with the order"

      - name: approval_to_delivery_days
        description: "Number of days between order approval and customer delivery, only for delivered orders"