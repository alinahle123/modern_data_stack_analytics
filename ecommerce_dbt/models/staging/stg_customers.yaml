version: 2

models:
  - name: stg_customers
    description: "Cleaned staging table for customers"
    columns:
      - name: CUSTOMER_ID
        tests:
          - unique
          - not_null
      - name: CUSTOMER_UNIQUE_ID
        tests:
          - not_null
      - name: CUSTOMER_ZIP_CODE_PREFIX
        tests:
          - not_null
          - relationships:
              to: ref('stg_geolocation')
              field: zip_code_prefix
              severity: warn

