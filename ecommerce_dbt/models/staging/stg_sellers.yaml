version: 2

models:
  - name: stg_sellers
    description: "Cleaned staging model for OLIST sellers"

    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

      - name: seller_zip_code_prefix
        tests:
          - not_null
          - relationships:
              to: ref('stg_geolocation')
              field: zip_code_prefix
              severity: warn

